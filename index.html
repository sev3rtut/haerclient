<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haer</title>
    <style>
        /* Общие сбросы и шрифты */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Анимированный футуристичный фон */
        body {
            background-color: #06070a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Динамические неоновые сферы на фоне */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15), transparent 70%);
            z-index: 0;
            animation: float 8s ease-in-out infinite alternate;
        }

        body::before {
            top: -100px;
            left: -100px;
        }

        body::after {
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15), transparent 70%);
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Декоративная сетка поверх всего фона */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        /* Премиум-карточка с эффектом стекла */
        .card {
            background: rgba(11, 12, 16, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 28px;
            padding: 55px 40px 45px;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(0, 242, 254, 0.1);
            max-width: 430px;
            width: 90%;
            z-index: 2;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
        }

        /* Эффект наклона при наведении мыши */
        .card:hover {
            border-color: rgba(0, 242, 254, 0.5);
            transform: perspective(1000px) translateY(-5px) rotateX(2deg);
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.7),
                0 0 50px rgba(0, 242, 254, 0.25);
        }

        /* Маленький индикатор версии над заголовком */
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 800;
            color: #00f2fe;
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 5px 14px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 18px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        /* Неоновый градиентный заголовок */
        h1 {
            font-size: 44px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 30%, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 242, 254, 0.3));
        }

        /* Описание */
        p {
            color: #8fa0b5;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
            letter-spacing: 0.3px;
        }

        /* Ультра-кнопка с внутренней подсветкой */
        .download-btn {
            display: block;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #06070a;
            padding: 18px 30px;
            font-size: 16px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 14px;
            box-shadow: 
                0 8px 25px rgba(0, 242, 254, 0.3),
                0 0 35px rgba(0, 242, 254, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        /* Эффект блика на кнопке при наведении */
        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: all 0.6s ease;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 12px 30px rgba(0, 242, 254, 0.45),
                0 0 50px rgba(0, 242, 254, 0.3);
            filter: brightness(1.1);
        }

        .download-btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="card">
        <h1>haerclient</h1>
        <p>скачать можна ниже :з</p>
        
        <a href="haer/popa/client.rar" class="download-btn" download>Скачать софт</a>
    </div>

</body>
</html>
