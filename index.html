<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haer</title>
    <style>
    
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }


        body {
            background-color: #06070a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Динамические неоновые сферы на фоне */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15), transparent 70%);
            z-index: 0;
            animation: float 8s ease-in-out infinite alternate;
        }

        body::before {
            top: -100px;
            left: -100px;
        }

        body::after {
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15), transparent 70%);
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }


        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        
        .card {
            background: rgba(11, 12, 16, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 28px;
            padding: 40px 40px 45px;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(0, 242, 254, 0.1);
            max-width: 430px;
            width: 90%;
            z-index: 2;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: rgba(0, 242, 254, 0.5);
            transform: perspective(1000px) translateY(-5px) rotateX(2deg);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 50px rgba(0, 242, 254, 0.25);
        }




        h1 {
            font-size: 44px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 30%, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 242, 254, 0.3));
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
        }

      
        .globe-icon {
            font-size: 0.8em; 
            filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.5));
        }

        p {
            color: #8fa0b5;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .download-btn {
            display: block;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #06070a;
            padding: 18px 30px;
            font-size: 16px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="card">
        <img src="popa/popa.png" alt="haer logo" class="card-img">
        
        <h1><span class="globe-icon">🌐</span> haer</h1>
        <p>скачать можно ниже :з</p>
        
        <a href="popa/client.rar" class="download-btn" download>Скачать софт</a>
    </div>

</body>
</html>
